<div class="min-h-screen bg-[#fafbfc] flex items-center justify-center px-4 py-16 relative overflow-hidden">

    <!-- Background Floating Icons -->
    <div class="absolute inset-0 overflow-hidden">

        <!-- Apple — Top Left -->
        <div class="absolute top-[10%] left-[5%] text-primary-200 text-4xl animate-[float_6s_ease-in-out_infinite]">
            <i class="fas fa-apple-whole"></i>
        </div>

        <!-- Carrot — Top Right -->
        <div
            class="absolute top-[20%] right-[10%] text-primary-200 text-3xl animate-[float_8s_ease-in-out_infinite_1s]">
            <i class="fas fa-carrot"></i>
        </div>

        <!-- Lemon — Bottom Left -->
        <div
            class="absolute bottom-[25%] left-[8%] text-primary-200 text-3xl animate-[float_7s_ease-in-out_infinite_0.5s]">
            <i class="fas fa-lemon"></i>
        </div>

        <!-- Seedling — Bottom Right -->
        <div
            class=" absolute bottom-[15%] right-[15%] text-primary-200 text-4xl animate-[float_9s_ease-in-out_infinite_2s]">
            <i class="fas fa-seedling"></i>
        </div>

        <!-- Apple — Middle Left -->
        <div
            class=" absolute top-[50%] left-[15%] text-primary-100 text-2xl animate-[float_5s_ease-in-out_infinite_1.5s]">
            <i class="fas fa-apple-whole"></i>
        </div>

        <!-- Carrot — Middle Right -->
        <div
            class=" absolute top-[40%] right-[5%] text-primary-100 text-2xl animate-[float_6s_ease-in-out_infinite_0.8s]">
            <i class="fas fa-carrot"></i>
        </div>

        <!-- Background Blur — Top Right -->
        <div
            class="absolute top-0 right-0 w-125 h-125 bg-linear-to-bl from-primary-100/40 to-transparent rounded-full blur-3xl">
        </div>

        <!-- Background Blur — Bottom Left -->
        <div
            class="absolute bottom-0 left-0 w-100 h-100 bg-linear-to-tr from-primary-100/30 to-transparent rounded-full blur-3xl">
        </div>

    </div>

    <!-- Main Content -->
    <div class="relative z-10 max-w-xl w-full">

        <!-- Cart Illustration -->
        <div class="flex justify-center mb-10">
            <div class="relative">
                <div class="absolute inset-0 w-64 h-52 sm:w-72 sm:h-60 bg-primary-100/50 rounded-4xl blur-2xl"></div>
                <div class="relative w-64 h-52 sm:w-72 sm:h-60">

                    <!-- Cart Card -->
                    <div
                        class="absolute inset-x-0 top-4 mx-auto w-52 h-40 sm:w-60 sm:h-44 bg-white rounded-3xl shadow-xl shadow-gray-200/60 border border-gray-100 flex items-center justify-center overflow-hidden">
                        <div
                            class="absolute inset-0 bg-linear-to-br from-primary-50/80 via-transparent to-primary-100/40">
                        </div>
                        <i class="fas fa-cart-shopping relative text-6xl sm:text-7xl text-primary-400/80"></i>
                    </div>

                    <!-- 404 Badge -->
                    <div class="absolute -top-2 -right-2 sm:top-0 sm:right-0">
                        <div class="relative">
                            <div class="absolute -inset-2 rounded-full bg-white shadow-lg"></div>
                            <div
                                class="relative w-16 h-16 sm:w-20 sm:h-20 rounded-full bg-linear-to-br from-primary-500 to-primary-600 flex items-center justify-center shadow-lg shadow-primary-500/40">
                                <span class="text-xl sm:text-2xl font-black text-white tracking-tight">404</span>
                            </div>
                        </div>
                    </div>

                    <!-- Cart Wheels -->
                    <div class="absolute -bottom-1 left-1/2 -translate-x-1/2 flex items-center justify-center gap-4">
                        <div class="w-2.5 h-2.5 rounded-full bg-primary-400"></div>
                        <div class="w-8 h-4 border-b-[3px] border-primary-400 rounded-b-full"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-primary-400"></div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Title & Description -->
        <div class="text-center mb-10">
            <h1 class="text-4xl sm:text-5xl font-black text-gray-900 mb-4 tracking-tight">Oops! Nothing Here</h1>
            <p class="text-gray-500 text-lg leading-relaxed max-w-md mx-auto">
                Looks like this page went out of stock! Don't worry, there's plenty more fresh content to explore.
            </p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">

            <!-- Go to Homepage -->
            <a routerLink="/home"
                class="group w-full sm:w-auto inline-flex items-center justify-center gap-3 bg-primary-600 hover:bg-primary-700 text-white py-4 px-8 rounded-2xl font-bold text-lg transition-all duration-300 shadow-lg shadow-primary-600/25 hover:shadow-xl hover:shadow-primary-600/30 hover:-translate-y-1 cursor-pointer">
                <i class="fas fa-house group-hover:scale-110 transition-transform duration-300"></i>
                Go to Home page
            </a>

            <!-- Go Back -->
            <button (click)="goBack()"
                class="group w-full sm:w-auto inline-flex items-center justify-center gap-3 bg-white hover:bg-gray-50 text-gray-700 py-4 px-8 rounded-2xl font-bold text-lg transition-all duration-300 shadow-md hover:shadow-lg border border-gray-200 hover:-translate-y-1 cursor-pointer">
                <i class="fas fa-arrow-left group-hover:-translate-x-1 transition-transform duration-300"></i>
                Go Back
            </button>

        </div>

        <!-- Popular Destinations -->
        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-6">
            <p class="text-center text-sm font-medium text-gray-400 uppercase tracking-wider mb-4">
                Popular Destinations
            </p>
            <div class="flex flex-wrap items-center justify-center gap-3">
                <a routerLink="/shop"
                    class="px-5 py-2.5 rounded-xl bg-primary-50 text-primary-700 font-semibold text-sm hover:bg-primary-100 transition-colors">
                    All Products
                </a>
                <a routerLink="/all-categories"
                    class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-semibold text-sm hover:bg-gray-200 transition-colors">
                    Categories
                </a>
                <a routerLink="/shop"
                    class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-semibold text-sm hover:bg-gray-200 transition-colors">
                    Today's Deals
                </a>
                <a routerLink="/support"
                    class="px-5 py-2.5 rounded-xl bg-gray-100 text-gray-700 font-semibold text-sm hover:bg-gray-200 transition-colors">
                    Contact Us
                </a>
            </div>
        </div>

    </div>
</div>
