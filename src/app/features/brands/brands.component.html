<div class="min-h-screen bg-gray-50/50">
    <!-- header of barnds  -->
    <section>
        <div class="bg-linear-to-br from-violet-600 via-violet-500 to-purple-400 text-white">
            <div class="container mx-auto px-4 py-12 sm:py-16">
                <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
                    <!-- routerLinke to home  -->
                    <a class="hover:text-white transition-colors cursor-pointer" routerLink="/home">
                        Home
                    </a>
                    <span class="text-white/40">/</span>
                    <span class="text-white font-medium">Brands</span>
                </nav>
                <div class="flex items-center gap-5">
                    <div
                        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
                        <svg data-prefix="fas" data-icon="tags" class="svg-inline--fa fa-tags text-3xl" role="img"
                            width="38" height="30" viewBox="0 0 576 512" aria-hidden="true">
                            <path fill="currentColor"
                                d="M401.2 39.1L549.4 189.4c27.7 28.1 27.7 73.1 0 101.2L393 448.9c-9.3 9.4-24.5 9.5-33.9 .2s-9.5-24.5-.2-33.9L515.3 256.8c9.2-9.3 9.2-24.4 0-33.7L367 72.9c-9.3-9.4-9.2-24.6 .2-33.9s24.6-9.2 33.9 .2zM32.1 229.5L32.1 96c0-35.3 28.7-64 64-64l133.5 0c17 0 33.3 6.7 45.3 18.7l144 144c25 25 25 65.5 0 90.5L285.4 418.7c-25 25-65.5 25-90.5 0l-144-144c-12-12-18.7-28.3-18.7-45.3zm144-85.5a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">Top Brands</h1>
                        <p class="text-white/80 mt-1">Shop from your favorite brands</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- body of brands -->
    <section>
        <div class="container mx-auto px-4 py-10">
            @if (isLoading()) {
            <div class="flex items-center justify-center py-20">
                <div class="flex flex-col items-center justify-center">
                    <svg data-prefix="fas" data-icon="spinner" width="30" height="25"
                        class="svg-inline--fa fa-spinner text-4xl text-violet-700 animate-spin mb-4" role="img"
                        viewBox="0 0 512 512" aria-hidden="true">
                        <path fill="currentColor"
                            d="M208 48a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm0 416a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zM48 208a48 48 0 1 1 0 96 48 48 0 1 1 0-96zm368 48a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zM75 369.1A48 48 0 1 1 142.9 437 48 48 0 1 1 75 369.1zM75 75A48 48 0 1 1 142.9 142.9 48 48 0 1 1 75 75zM437 369.1A48 48 0 1 1 369.1 437 48 48 0 1 1 437 369.1z">
                        </path>
                    </svg>
                    <p class="text-gray-500">Loading categories...</p>
                </div>
            </div>
            }@else {
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 sm:gap-5">
                @for (item of brandList().data; track item._id) {
                <!-- navget router -->
                <div [routerLink]="['/products-brand' , item._id]"
                    class="group bg-white rounded-2xl border border-gray-100 p-4 sm:p-5 shadow-sm hover:shadow-xl hover:border-violet-200 transition-all duration-300 hover:-translate-y-1 cursor-pointer">
                    <div
                        class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-3 p-4 flex items-center justify-center">
                        <img [alt]="item.slug"
                            class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500"
                            [src]="item.image">
                    </div>
                    <h3
                        class="font-semibold text-gray-900 text-center text-sm group-hover:text-violet-600 transition-colors truncate">
                        {{item.name}}
                    </h3>
                    <div class="flex justify-center mt-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-xs text-violet-600 flex items-center gap-1">
                            View Products
                            <svg data-prefix="fas" data-icon="arrow-right" width="13" height="10"
                                class="svg-inline--fa fa-arrow-right text-2xs" role="img" viewBox="0 0 512 512"
                                aria-hidden="true">
                                <path fill="currentColor"
                                    d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z">
                                </path>
                            </svg>
                        </span>
                    </div>
                </div>
                }@empty {
                <div class="text-center py-20">
                    <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5">
                        <svg data-prefix="fas" data-icon="box-open" width="30" height="25"
                            class="svg-inline--fa fa-box-open text-3xl text-gray-400" role="img" viewBox="0 0 640 512"
                            aria-hidden="true">
                            <path fill="currentColor"
                                d="M560.3 237.2c10.4 11.8 28.3 14.4 41.8 5.5 14.7-9.8 18.7-29.7 8.9-44.4l-48-72c-2.8-4.2-6.6-7.7-11.1-10.2L351.4 4.7c-19.3-10.7-42.8-10.7-62.2 0L88.8 116c-5.4 3-9.7 7.4-12.6 12.8L27.7 218.7c-12.6 23.4-3.8 52.5 19.6 65.1l33 17.7 0 53.3c0 23 12.4 44.3 32.4 55.7l176 99.7c19.6 11.1 43.5 11.1 63.1 0l176-99.7c20.1-11.4 32.4-32.6 32.4-55.7l0-117.5zm-240-9.8L170.2 144 320.3 60.6 470.4 144 320.3 227.4zm-41.5 50.2l-21.3 46.2-165.8-88.8 25.4-47.2 161.7 89.8z">
                            </path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-bold text-gray-900 mb-2">No Brands Found</h3>
                    <!-- routerLinke to all-products -->
                    <a
                        class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-primary-600 text-white font-semibold hover:bg-primary-700 transition-colors cursor-pointer">
                        View All Products
                    </a>
                </div>
                }
            </div>
            }
        </div>
    </section>

</div>
