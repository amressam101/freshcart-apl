<div class="min-h-screen bg-gray-50/50">
    <!-- section header of all-categories  -->
    <section>
        <div class="bg-linear-to-br from-primary-600 via-primary-500 to-primary-400 text-white">
            <div class="container mx-auto px-4 py-12 sm:py-16">
                <nav class="flex items-center gap-2 text-sm text-white/70 mb-6">
                    <a routerLink="/home" class="hover:text-white transition-colors cursor-pointer">
                        Home
                    </a>
                    <span class="text-white/40">/</span>
                    <span class="text-white font-medium">Categories</span>
                </nav>
                <div class="flex items-center gap-5">
                    <div
                        class="w-16 h-16 rounded-2xl bg-white/20 backdrop-blur-sm flex items-center justify-center shadow-xl ring-1 ring-white/30">
                        <svg data-prefix="fas" data-icon="layer-group" class="svg-inline--fa fa-layer-group text-3xl"
                            width="38" height="30" role="img" viewBox="0 0 512 512" aria-hidden="true">
                            <path fill="currentColor"
                                d="M232.5 5.2c14.9-6.9 32.1-6.9 47 0l218.6 101c8.5 3.9 13.9 12.4 13.9 21.8s-5.4 17.9-13.9 21.8l-218.6 101c-14.9 6.9-32.1 6.9-47 0L13.9 149.8C5.4 145.8 0 137.3 0 128s5.4-17.9 13.9-21.8L232.5 5.2zM48.1 218.4l164.3 75.9c27.7 12.8 59.6 12.8 87.3 0l164.3-75.9 34.1 15.8c8.5 3.9 13.9 12.4 13.9 21.8s-5.4 17.9-13.9 21.8l-218.6 101c-14.9 6.9-32.1 6.9-47 0L13.9 277.8C5.4 273.8 0 265.3 0 256s5.4-17.9 13.9-21.8l34.1-15.8zM13.9 362.2l34.1-15.8 164.3 75.9c27.7 12.8 59.6 12.8 87.3 0l164.3-75.9 34.1 15.8c8.5 3.9 13.9 12.4 13.9 21.8s-5.4 17.9-13.9 21.8l-218.6 101c-14.9 6.9-32.1 6.9-47 0L13.9 405.8C5.4 401.8 0 393.3 0 384s5.4-17.9 13.9-21.8z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">All Categories</h1>
                        <p class="text-white/80 mt-1">Browse our wide range of product categories</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- section body of all-categories  -->
    <section>
        <div class="container mx-auto px-4 py-10">

            @if (isLoading()) {
            <div class="flex items-center justify-center py-20">
                <div class="flex flex-col items-center justify-center">
                    <svg data-prefix="fas" data-icon="spinner" width="30" height="25"
                        class="svg-inline--fa fa-spinner text-4xl text-primary-600 animate-spin mb-4" role="img"
                        viewBox="0 0 512 512" aria-hidden="true">
                        <path fill="currentColor"
                            d="M208 48a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zm0 416a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zM48 208a48 48 0 1 1 0 96 48 48 0 1 1 0-96zm368 48a48 48 0 1 1 96 0 48 48 0 1 1 -96 0zM75 369.1A48 48 0 1 1 142.9 437 48 48 0 1 1 75 369.1zM75 75A48 48 0 1 1 142.9 142.9 48 48 0 1 1 75 75zM437 369.1A48 48 0 1 1 369.1 437 48 48 0 1 1 437 369.1z">
                        </path>
                    </svg>
                    <p class="text-gray-500">Loading categories...</p>
                </div>
            </div>
            }@else {
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
                @for (item of categorieList(); track item._id) {
                <!-- routerLinke on div  -->
                <div [routerLink]="['/categories-details' , item._id]"
                    class="group bg-white rounded-2xl border border-gray-100 p-4 sm:p-6 shadow-sm hover:shadow-xl hover:border-primary-200 transition-all duration-300 hover:-translate-y-1 cursor-pointer">
                    <div class="aspect-square rounded-xl overflow-hidden bg-gray-50 mb-4">
                        <img [alt]="item.slug"
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
                            [src]="item.image">
                    </div>
                    <h3 class="font-bold text-gray-900 text-center group-hover:text-primary-600 transition-colors">
                        {{item.name}}
                    </h3>
                    <div class="flex justify-center mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-xs text-primary-600 flex items-center gap-1">
                            View Subcategories
                            <svg data-prefix="fas" data-icon="arrow-right"
                                class="svg-inline--fa fa-arrow-right text-2xs" width="13" height="10" role="img"
                                viewBox="0 0 512 512" aria-hidden="true">
                                <path fill="currentColor"
                                    d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z">
                                </path>
                            </svg>
                        </span>
                    </div>
                </div>
                }
            </div>
            }
        </div>
    </section>

</div>
