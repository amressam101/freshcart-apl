<div class="bg-white rounded-lg p-4 text-center shadow-sm hover:shadow-md transition group cursor-pointer"
    [routerLink]="['/categories-details' , item()?._id]">
    <div
        class="h-20 w-20 overflow-hidden bg-primary-100 rounded-full flex items-center justify-center mx-auto mb-3 group-hover:bg-primary-200 transition">
        <img [alt]="item()?.slug" loading="lazy" width="300" height="300" decoding="async" data-nimg="1"
            class="w-full h-full object-cover" [src]="item()?.image" style="color: transparent;">
    </div>
    <h3 class="font-medium">{{item()?.name}}</h3>
</div>
